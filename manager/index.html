<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaaS Master Control | ProDigital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide:0.263.0/lucide.min.js"></script>
    
    <!-- Firebase JS SDK v8 compat -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0b1120] text-slate-200 min-h-screen font-sans overflow-x-hidden">

    <div id="toast-container" class="fixed bottom-5 right-5 z-[9999] flex flex-col gap-2"></div>

    <!-- Login -->
    <div id="auth-overlay" class="fixed inset-0 bg-[#0b1120] z-[100] flex flex-col items-center justify-center p-6">
        <div class="bg-[#1e293b] p-8 md:p-10 rounded-3xl border border-slate-700/50 w-full max-w-md shadow-2xl">
            <div class="bg-indigo-600/20 p-4 rounded-full w-20 h-20 mx-auto mb-6 flex items-center justify-center border border-indigo-500/30 text-indigo-400">
                <i data-lucide="shield-check" class="w-10 h-10"></i>
            </div>
            <h1 class="text-2xl font-black mb-1 text-white text-center uppercase tracking-tight">SaaS Maestro</h1>
            <p class="text-slate-400 mb-8 text-sm text-center font-bold">Administración Central de Escuelas</p>
            
            <form id="login-form" class="space-y-4">
                <input type="email" id="email" required placeholder="Email autorizado (Admin)" class="w-full p-4 rounded-xl bg-[#0f172a] border border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none text-white transition-all">
                <input type="password" id="password" required placeholder="Contraseña" class="w-full p-4 rounded-xl bg-[#0f172a] border border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none text-white transition-all">
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-xl transition-all uppercase tracking-widest text-sm shadow-lg shadow-indigo-500/20">
                    Autenticar Sistema
                </button>
            </form>
            <p id="auth-error" class="text-red-400 bg-red-500/10 border border-red-500/20 p-3 rounded-lg mt-4 text-xs hidden font-bold text-center uppercase"></p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="main-content" class="hidden flex-col min-h-screen">
        <header class="bg-[#1e293b]/90 border-b border-slate-700 p-4 sticky top-0 backdrop-blur-xl z-40">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-500/20">
                        <i data-lucide="layout-dashboard" class="text-white w-5 h-5"></i>
                    </div>
                    <h2 class="text-lg font-black text-white uppercase tracking-tighter">Master Control <span class="text-indigo-400">Escuelas</span></h2>
                </div>
                <button id="btn-logout" class="bg-slate-800 hover:bg-red-500/20 text-slate-400 hover:text-red-400 px-4 py-2 rounded-xl text-xs font-bold transition-all border border-slate-700 flex items-center gap-2">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Cerrar Sesión
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 md:p-8 w-full flex-1">
            <!-- Formulario de Nuevo Cliente -->
            <section class="bg-[#1e293b] border border-slate-700 p-6 md:p-8 rounded-3xl mb-8 shadow-2xl relative overflow-hidden">
                <h3 class="text-lg font-black mb-6 text-white uppercase flex items-center gap-2">
                    <i data-lucide="zap" class="text-indigo-400"></i> Desplegar Nueva Escuela (Tenant)
                </h3>
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-5">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-indigo-400 uppercase ml-1">ID Único (Correo/ID)*</label>
                        <input type="text" id="new-id" placeholder="escuela_carpio" class="w-full bg-[#0b1120] border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-mono text-white transition-all">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-emerald-500 uppercase ml-1">UID del Administrador*</label>
                        <input type="text" id="new-uid" placeholder="Pegar UID de Firebase" class="w-full bg-[#0b1120] border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 text-sm font-mono text-white transition-all">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Nombre Institución</label>
                        <input type="text" id="new-name" placeholder="Nombre completo" class="w-full bg-[#0b1120] border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm text-white transition-all">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Plan de Servicio</label>
                        <select id="new-plan" class="w-full bg-[#0b1120] border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm text-white appearance-none transition-all">
                            <option value="Mensual">Suscripción Mensual</option>
                            <option value="Anual">Suscripción Anual</option>
                        </select>
                    </div>
                </div>
                
                <button id="btn-create" class="mt-4 w-full md:w-auto bg-indigo-600 hover:bg-indigo-500 text-white font-black px-10 py-4 rounded-2xl transition-all uppercase text-xs tracking-widest shadow-xl shadow-indigo-500/20">
                    Activar Escuela
                </button>
            </section>

            <!-- Tabla de Clientes -->
            <div class="bg-[#1e293b] rounded-3xl border border-slate-700/50 overflow-hidden shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-900/60 text-slate-500 text-[10px] uppercase font-black border-b border-slate-700">
                            <tr>
                                <th class="p-6">Institución / ID</th>
                                <th class="p-6 text-center">Estado</th>
                                <th class="p-6 text-right">Gestión</th>
                            </tr>
                        </thead>
                        <tbody id="tenant-list" class="divide-y divide-slate-700/40"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Configuración -->
    <div id="manageModal" class="fixed inset-0 bg-[#0b1120]/95 z-[200] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-[#1e293b] border border-slate-600 w-full max-w-lg rounded-[2rem] p-8 shadow-2xl">
            <h2 class="text-lg font-black text-white uppercase mb-6">Gestionar Estado</h2>
            <div class="space-y-4">
                <div class="flex gap-2">
                    <button onclick="setStatus('Activo')" class="flex-1 py-3 bg-emerald-600/20 border border-emerald-500/50 text-emerald-400 rounded-xl font-bold uppercase text-[10px]">Activar</button>
                    <button onclick="setStatus('Suspendido')" class="flex-1 py-3 bg-red-600/20 border border-red-500/50 text-red-400 rounded-xl font-bold uppercase text-[10px]">Bloquear (Mora)</button>
                </div>
                <button onclick="closeModal('manageModal')" class="w-full py-3 bg-slate-700 text-white rounded-xl font-bold uppercase text-[10px]">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-3shuRaHP2LP2R39G9IUu7dBB-Dtan94",
            authDomain: "tenant-escuela.firebaseapp.com",
            projectId: "tenant-escuela",
            storageBucket: "tenant-escuela.firebasestorage.app",
            messagingSenderId: "456023877565",
            appId: "1:456023877565:web:f29a83b9c6f2ee374bd4d4",
            measurementId: "G-ZK03Q0855K"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const BASE_CLIENT_URL = "https://prodigitalcr.github.io/TENANT-ESCUELA/"; 
        
        let editingId = null;

        const showToast = (msg, type = 'success') => {
            const t = document.createElement('div');
            t.className = `fixed bottom-5 right-5 p-4 rounded-xl shadow-2xl font-black text-white text-[10px] uppercase ${type === 'success' ? 'bg-emerald-600' : 'bg-red-600'} z-[9999]`;
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        };

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                loadData();
            }
        });

        function loadData() {
            db.collection('tenants').onSnapshot(snap => {
                const list = document.getElementById('tenant-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const t = d.data();
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="p-6"><div class="font-black text-white">${t.empresa}</div><div class="text-[10px] text-indigo-400">${d.id}</div></td>
                        <td class="p-6 text-center"><span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${t.estado === 'Activo' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-400'}">${t.estado}</span></td>
                        <td class="p-6 text-right"><button onclick="openEdit('${d.id}')" class="text-indigo-400 hover:text-white"><i data-lucide="settings"></i></button></td>
                    `;
                    list.appendChild(row);
                });
                lucide.createIcons();
            });
        }

        window.openEdit = (id) => { editingId = id; document.getElementById('manageModal').classList.remove('hidden'); };
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        window.setStatus = async (status) => {
            try {
                await db.collection('tenants').doc(editingId).update({ estado: status });
                showToast("Estado actualizado a " + status);
                closeModal('manageModal');
            } catch(e) { showToast("Error: " + e.message, "error"); }
        };

        document.getElementById('btn-create').addEventListener('click', async () => {
            const id = document.getElementById('new-id').value.trim();
            if(!id) return;
            await db.collection('tenants').doc(id).set({
                empresa: document.getElementById('new-name').value,
                estado: 'Activo',
                adminUid: document.getElementById('new-uid').value
            });
            showToast("Escuela creada");
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
                .catch(() => document.getElementById('auth-error').classList.remove('hidden'));
        });
        document.getElementById('btn-logout').addEventListener('click', () => auth.signOut());
    </script>
</body>
</html>
