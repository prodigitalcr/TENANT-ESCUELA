<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicación Autenticada - Socio</title>
    
    <!-- Firebase (Misma versión del panel maestro) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --bg-dark: #0a0e27;
            --text-primary: #e8eef5;
            --accent-danger: #ff4444;
            --accent-warning: #ffb800;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* CAPA DE BLOQUEO (MOROSIDAD / MANTENIMIENTO) */
        #bloqueo-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 8, 16, 0.95);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        
        .bloqueo-card {
            background: #1a1f3a;
            padding: 40px;
            border-radius: 16px;
            border: 2px solid var(--accent-danger);
            max-width: 500px;
            box-shadow: 0 16px 48px rgba(255, 68, 68, 0.2);
        }

        .bloqueo-card.mantenimiento {
            border-color: var(--accent-warning);
            box-shadow: 0 16px 48px rgba(255, 184, 0, 0.2);
        }

        /* APP PRINCIPAL AISLADA */
        #app-content {
            display: none; /* Oculto hasta verificar estado */
            padding: 20px;
            flex: 1;
        }

        .navbar-tenant {
            background: rgba(26, 31, 58, 0.9);
            padding: 15px 20px;
            border-bottom: 1px solid #2a3250;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE ESTADO RESTRINGIDO -->
    <div id="bloqueo-overlay" style="display: none;">
        <div id="bloqueo-card" class="bloqueo-card">
            <h1 id="bloqueo-titulo">Acceso Restringido</h1>
            <p id="bloqueo-mensaje">Verificando estado de la cuenta...</p>
            <div style="margin-top: 20px; font-size: 0.8rem; color: #7a8299;">
                UID: <span id="display-uid">---</span>
            </div>
        </div>
    </div>

    <!-- PANTALLA DE LA APLICACIÓN (SOLO ACTIVA SI ESTADO == ACTIVO) -->
    <div id="app-content">
        <div class="navbar-tenant">
            <h2 id="tenant-name" style="margin: 0; color: #00d9ff;">Cargando Entorno...</h2>
            <button onclick="cerrarSesionSocio()" style="background: transparent; color: white; border: 1px solid #3a4560; padding: 5px 15px; border-radius: 5px; cursor: pointer;">Salir</button>
        </div>
        
        <div style="margin-top: 30px;">
            <h3>Panel de Trabajo del Socio</h3>
            <p>Toda la información aquí mostrada está aislada lógica y criptográficamente en la ruta: <code>/socios/<b id="ruta-uid"></b>/datos/</code></p>
            
            <!-- Aquí iría la lógica específica del socio (ej. sistema de asistencia, ventas, etc.) -->
        </div>
    </div>

    <script>
        // 1. INICIALIZACIÓN DE FIREBASE (Conectar al mismo proyecto maestro)
        const firebaseConfig = {
            apiKey: "AIzaSyBpGu...", // Tus credenciales maestras
            authDomain: "tu-proyecto.firebaseapp.com",
            databaseURL: "https://tu-proyecto-default-rtdb.firebaseio.com",
            projectId: "tu-proyecto"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let tenantUID = null;
        let estadoListener = null;

        // 2. ESCUCHADOR DE AUTENTICACIÓN
        auth.onAuthStateChanged((user) => {
            if (user) {
                tenantUID = user.uid;
                document.getElementById('display-uid').innerText = tenantUID;
                document.getElementById('ruta-uid').innerText = tenantUID;
                iniciarConexionMaestra(tenantUID);
            } else {
                // Si no hay sesión, redirigir a un login genérico o mostrar modal
                manejarRedireccionLogin();
            }
        });

        // 3. AISLAMIENTO Y CONTROL EN TIEMPO REAL DESDE EL PANEL MAESTRO
        function iniciarConexionMaestra(uid) {
            const socioRef = database.ref(`socios/${uid}`);

            // Cargar datos básicos (Nombre del colegio/empresa, logos)
            socioRef.child('perfil').once('value').then(snap => {
                if(snap.exists()) {
                    document.getElementById('tenant-name').innerText = snap.val().nombreApp || "Aplicación Cliente";
                }
            });

            // ESCUCHADOR CRÍTICO: Vigila el estado de morosidad o mantenimiento
            if(estadoListener) socioRef.child('estado').off('value', estadoListener);
            
            estadoListener = socioRef.child('estado').on('value', (snap) => {
                if(snap.exists()) {
                    const status = snap.val();
                    evaluarEstadoSocio(status.estatus, status.mensajeBloqueo);
                } else {
                    // Si no existe nodo de estado, asumir error o cuenta no inicializada
                    evaluarEstadoSocio('error', 'Cuenta no configurada por el administrador.');
                }
            });
        }

        // 4. LÓGICA DE RENDERIZADO SEGÚN ESTATUS
        function evaluarEstadoSocio(estatus, mensajePersonalizado) {
            const bloqueoOverlay = document.getElementById('bloqueo-overlay');
            const bloqueoCard = document.getElementById('bloqueo-card');
            const titulo = document.getElementById('bloqueo-titulo');
            const mensaje = document.getElementById('bloqueo-mensaje');
            const appContent = document.getElementById('app-content');

            if (estatus === 'activo') {
                // Liberar la aplicación
                bloqueoOverlay.style.display = 'none';
                appContent.style.display = 'block';
                
            } else if (estatus === 'moroso') {
                // Bloquear por falta de pago
                bloqueoOverlay.style.display = 'flex';
                appContent.style.display = 'none';
                bloqueoCard.className = 'bloqueo-card'; // Borde rojo
                titulo.innerText = "🔒 Servicio Suspendido";
                titulo.style.color = "var(--accent-danger)";
                mensaje.innerText = mensajePersonalizado || "El sistema ha sido pausado por un saldo pendiente. Por favor, regularice su cuenta o reporte sus pagos SINPE al administrador maestro para reactivar el servicio.";
                
            } else if (estatus === 'mantenimiento') {
                // Bloquear por actualización
                bloqueoOverlay.style.display = 'flex';
                appContent.style.display = 'none';
                bloqueoCard.className = 'bloqueo-card mantenimiento'; // Borde amarillo
                titulo.innerText = "⚙️ En Mantenimiento";
                titulo.style.color = "var(--accent-warning)";
                mensaje.innerText = mensajePersonalizado || "Estamos realizando mejoras en su plataforma aislada. El servicio regresará en breve.";
            }
        }

        function cerrarSesionSocio() {
            auth.signOut().then(() => { window.location.reload(); });
        }

        function manejarRedireccionLogin() {
            // Aquí puedes forzar un auth.signInWithEmailAndPassword
            // Para propósitos de prueba, simularemos que no hay sesión:
            document.getElementById('bloqueo-overlay').style.display = 'flex';
            document.getElementById('bloqueo-titulo').innerText = "Autenticación Requerida";
            document.getElementById('bloqueo-mensaje').innerText = "Inicie sesión con su cuenta de administrador de entorno.";
        }
    </script>
</body>
</html>
