<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaaS Master Control | ProDigital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide:0.263.0/lucide.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0b1120] text-slate-200 min-h-screen font-sans overflow-x-hidden">

    <div id="toast-container" class="fixed bottom-5 right-5 z-[9999] flex flex-col gap-2"></div>

    <div id="auth-overlay" class="fixed inset-0 bg-[#0b1120] z-[100] flex flex-col items-center justify-center p-6">
        <div class="bg-[#1e293b] p-8 md:p-10 rounded-3xl border border-slate-700/50 w-full max-w-md shadow-2xl">
            <div class="bg-indigo-600/20 p-4 rounded-full w-20 h-20 mx-auto mb-6 flex items-center justify-center border border-indigo-500/30 text-indigo-400">
                <i data-lucide="shield-check" class="w-10 h-10"></i>
            </div>
            <h1 class="text-2xl font-black mb-1 text-white text-center uppercase tracking-tight">SaaS ProDigital</h1>
            <p class="text-slate-400 mb-8 text-sm text-center font-bold">Panel de Soporte Maestro</p>
            
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" id="email" required placeholder="Email autorizado" class="w-full p-4 rounded-xl bg-[#0f172a] border border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none text-white">
                <input type="password" id="password" required placeholder="Contraseña" class="w-full p-4 rounded-xl bg-[#0f172a] border border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none text-white">
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-xl transition-all uppercase tracking-widest text-sm">
                    Autenticar Sistema
                </button>
            </form>
            <p id="auth-error" class="text-red-400 bg-red-500/10 border border-red-500/20 p-3 rounded-lg mt-4 text-xs hidden font-bold text-center uppercase"></p>
        </div>
    </div>

    <div id="main-content" class="hidden flex-col min-h-screen">
        <header class="bg-[#1e293b]/90 border-b border-slate-700 p-4 sticky top-0 backdrop-blur-xl z-40">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-500/20">
                        <i data-lucide="layout-dashboard" class="text-white w-5 h-5"></i>
                    </div>
                    <h2 class="text-lg font-black text-white uppercase tracking-tighter">Master Control <span class="text-indigo-400">v2.0</span></h2>
                </div>
                <button onclick="handleLogout()" class="bg-slate-800 hover:bg-red-500/20 text-slate-400 hover:text-red-400 px-4 py-2 rounded-xl text-xs font-bold transition-all border border-slate-700 flex items-center gap-2">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Cerrar Sesión
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 md:p-8 w-full flex-1">
            <section class="bg-[#1e293b] border border-slate-700 p-6 md:p-8 rounded-3xl mb-8 shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8 opacity-5">
                    <i data-lucide="user-plus" class="w-24 h-24"></i>
                </div>
                
                <h3 class="text-lg font-black mb-6 text-white uppercase flex items-center gap-2">
                    <i data-lucide="zap" class="text-indigo-400"></i> Desplegar Nueva Instancia
                </h3>
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-5">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">ID Único (URL/Carpeta)</label>
                        <input type="text" id="new-id" placeholder="ej: ferreteria_sj" class="w-full bg-[#0b1120] border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-mono text-white">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-emerald-500 uppercase ml-1">UID Admin (CRÍTICO)</label>
                        <input type="text" id="new-uid" placeholder="ej: WjX83nKls..." class="w-full bg-[#0b1120] border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 text-sm font-mono text-white">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Nombre Comercial</label>
                        <input type="text" id="new-name" placeholder="Nombre de la empresa" class="w-full bg-[#0b1120] border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm text-white">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Plan de Servicio</label>
                        <select id="new-plan" class="w-full bg-[#0b1120] border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm text-white appearance-none">
                            <option value="Mensual">Suscripción Mensual</option>
                            <option value="Anual">Suscripción Anual</option>
                        </select>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-5">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">WhatsApp de Contacto</label>
                        <input type="text" id="new-tel" placeholder="50688888888" class="w-full bg-[#0b1120] border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm text-white">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Cuota (₡)</label>
                        <input type="number" id="new-monto" placeholder="0.00" class="w-full bg-[#0b1120] border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm text-white">
                    </div>
                    <div class="space-y-1 md:col-span-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Fecha de Próximo Corte</label>
                        <input type="date" id="new-corte" class="w-full bg-[#0b1120] border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm text-white">
                    </div>
                </div>

                <button onclick="createTenant()" class="mt-8 w-full md:w-auto bg-indigo-600 hover:bg-indigo-500 text-white font-black px-10 py-4 rounded-2xl transition-all uppercase text-xs tracking-widest shadow-xl shadow-indigo-500/20 flex items-center justify-center gap-2">
                    Iniciar Plataforma y Bloquear UID <i data-lucide="plus" class="w-4 h-4"></i>
                </button>
            </section>

            <div class="bg-[#1e293b] rounded-3xl border border-slate-700/50 overflow-hidden shadow-2xl">
                <div class="p-6 border-b border-slate-700 bg-slate-900/40 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h4 class="text-white font-black uppercase text-sm tracking-widest">Sistemas Monitorizados</h4>
                        <p class="text-slate-500 text-[10px] font-bold uppercase mt-1">Gestión de restricciones y acceso global (Doble Bloqueo)</p>
                    </div>
                    <div class="bg-indigo-500/10 text-indigo-400 px-4 py-2 rounded-full text-[10px] font-black uppercase border border-indigo-500/20 animate-pulse">
                        Sincronización Activa
                    </div>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-900/60 text-slate-500 text-[10px] uppercase font-black border-b border-slate-700">
                            <tr>
                                <th class="p-6">Socio / ID</th>
                                <th class="p-6">UID Admin (Base Datos)</th>
                                <th class="p-6">Plan / Vigencia</th>
                                <th class="p-6">Inversión</th>
                                <th class="p-6 text-center">Disponibilidad</th>
                                <th class="p-6 text-right">Gestión</th>
                            </tr>
                        </thead>
                        <tbody id="tenant-list" class="divide-y divide-slate-700/40">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="manageModal" class="fixed inset-0 bg-[#0b1120]/95 z-[200] hidden flex items-center justify-center p-4 backdrop-blur-md overflow-y-auto">
        <div class="bg-[#1e293b] border border-slate-600 w-full max-w-2xl rounded-[2.5rem] p-8 my-auto shadow-2xl relative">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-500/20 p-3 rounded-2xl text-indigo-400">
                        <i data-lucide="settings-2"></i>
                    </div>
                    <h2 class="text-xl font-black text-white uppercase tracking-tight">Ajustes de Servicio</h2>
                </div>
                <button onclick="closeModal('manageModal')" class="text-slate-500 hover:text-white transition-colors">
                    <i data-lucide="x-circle" class="w-8 h-8"></i>
                </button>
            </div>
            
            <div class="space-y-6">
                <div class="bg-slate-900/30 p-2 rounded-2xl border border-slate-700/50">
                    <label class="text-[10px] font-black text-slate-500 uppercase mb-3 block px-2">Estado de Acceso</label>
                    <div class="grid grid-cols-3 gap-2">
                        <label class="cursor-pointer group">
                            <input type="radio" name="m_status" value="Activo" class="hidden peer">
                            <div class="py-4 text-center rounded-xl border border-slate-700 bg-slate-800/50 peer-checked:bg-emerald-600/20 peer-checked:border-emerald-500 text-slate-500 peer-checked:text-emerald-400 font-black text-[10px] uppercase transition-all group-hover:border-slate-500">FUNCIONAL</div>
                        </label>
                        <label class="cursor-pointer group">
                            <input type="radio" name="m_status" value="Suspendido" class="hidden peer">
                            <div class="py-4 text-center rounded-xl border border-slate-700 bg-slate-800/50 peer-checked:bg-red-600/20 peer-checked:border-red-500 text-slate-500 peer-checked:text-red-400 font-black text-[10px] uppercase transition-all group-hover:border-slate-500">MOROSO</div>
                        </label>
                        <label class="cursor-pointer group">
                            <input type="radio" name="m_status" value="Mantenimiento" class="hidden peer">
                            <div class="py-4 text-center rounded-xl border border-slate-700 bg-slate-800/50 peer-checked:bg-amber-600/20 peer-checked:border-amber-500 text-slate-500 peer-checked:text-amber-400 font-black text-[10px] uppercase transition-all group-hover:border-slate-500">MANTENIM.</div>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <div class="bg-[#0b1120] p-5 rounded-3xl border border-slate-700">
                        <div class="flex justify-between items-center mb-3">
                            <label class="text-[10px] font-black text-slate-400 uppercase flex items-center gap-2">
                                <i data-lucide="code" class="w-3 h-3 text-red-500"></i> Mensaje de Morosidad (HTML)
                            </label>
                            <label class="cursor-pointer text-[9px] bg-indigo-600 text-white px-3 py-1.5 rounded-lg font-bold hover:bg-indigo-500 transition-all">
                                Cargar Archivo <input type="file" accept=".html" onchange="processHTML(event, 'm_html_mora')" class="hidden">
                            </label>
                        </div>
                        <textarea id="m_html_mora" rows="4" class="w-full bg-transparent border-0 outline-none text-indigo-300 font-mono text-[10px] resize-none" placeholder="Pega aquí el código HTML para clientes morosos..."></textarea>
                    </div>

                    <div class="bg-[#0b1120] p-5 rounded-3xl border border-slate-700">
                        <div class="flex justify-between items-center mb-3">
                            <label class="text-[10px] font-black text-slate-400 uppercase flex items-center gap-2">
                                <i data-lucide="wrench" class="w-3 h-3 text-amber-500"></i> Mensaje de Mantenimiento (HTML)
                            </label>
                            <label class="cursor-pointer text-[9px] bg-indigo-600 text-white px-3 py-1.5 rounded-lg font-bold hover:bg-indigo-500 transition-all">
                                Cargar Archivo <input type="file" accept=".html" onchange="processHTML(event, 'm_html_mant')" class="hidden">
                            </label>
                        </div>
                        <textarea id="m_html_mant" rows="4" class="w-full bg-transparent border-0 outline-none text-amber-300 font-mono text-[10px] resize-none" placeholder="Pega aquí el código HTML para mantenimiento programado..."></textarea>
                    </div>
                </div>

                <div class="flex gap-4 pt-4">
                    <button onclick="closeModal('manageModal')" class="flex-1 py-5 bg-slate-800 rounded-2xl font-bold text-slate-400 uppercase text-xs tracking-widest hover:bg-slate-700 transition-all">Cancelar</button>
                    <button onclick="saveChanges()" class="flex-[2] py-5 bg-indigo-600 rounded-2xl font-black text-white uppercase text-xs tracking-widest hover:bg-indigo-500 shadow-xl shadow-indigo-500/20 transition-all">Aplicar Doble Bloqueo (URL y UID)</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInAnonymously, signInWithCustomToken, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtPXuvsDuLDkpIJBlEEHFll6N-NofQ3bI",
            authDomain: "prestamos-c97ed.firebaseapp.com",
            projectId: "prestamos-c97ed",
            storageBucket: "prestamos-c97ed.firebasestorage.app",
            messagingSenderId: "511457800969",
            appId: "1:511457800969:web:18b8e97383fdb630b319d8",
            measurementId: "G-N0HK4HPLP1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const APP_MASTER_ID = "MASTER_ADMIN_SaaS";
        const BASE_URL = "https://prodigitalcr.github.io/PRESTAMOS/"; 
        
        let currentTenants = [];
        let editingId = null;

        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `p-4 rounded-xl shadow-2xl font-black text-white text-[10px] uppercase tracking-wider ${type === 'success' ? 'bg-emerald-600' : 'bg-red-600'} transition-all transform animate-bounce`;
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3500);
        };

        window.formatForDesktopView = (html) => {
            if (!html || html.trim() === '') return html;
            let formatted = html;
            
            if (/<meta[^>]*name=["']viewport["'][^>]*>/i.test(formatted)) {
                formatted = formatted.replace(/<meta[^>]*name=["']viewport["'][^>]*>/gi, '<meta name="viewport" content="width=1024">');
            } else if (/<head>/i.test(formatted)) {
                formatted = formatted.replace(/<head>/i, '<head>\n    <meta name="viewport" content="width=1024">');
            } else if (/<html/i.test(formatted)) {
                formatted = formatted.replace(/<html[^>]*>/i, '$&\n<head>\n    <meta name="viewport" content="width=1024">\n</head>');
            } else {
                formatted = `<!DOCTYPE html>\n<html lang="es">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=1024">\n    <style>body { margin: 0; padding: 0; background-color: #ffffff; min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; }</style>\n</head>\n<body>\n    ${formatted}\n</body>\n</html>`;
            }
            return formatted;
        };

        window.copyToClipboard = (text) => {
            navigator.clipboard.writeText(text).then(() => {
                showToast("URL Copiada al Portapapeles", "success");
            }).catch(err => {
                showToast("Error al copiar URL", "error");
            });
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth init error:", e);
            }
        };
        initAuth();

        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            if(email !== 'norercarlop04@gmail.com') {
                const errBox = document.getElementById('auth-error');
                errBox.innerText = "Error: Acceso Denegado (Solo Administrador)";
                errBox.classList.remove('hidden');
                return;
            }
            try {
                await setPersistence(auth, browserLocalPersistence);
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                const errBox = document.getElementById('auth-error');
                errBox.innerText = "Error: Credenciales Incorrectas";
                errBox.classList.remove('hidden');
            }
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === 'norercarlop04@gmail.com') {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
            lucide.createIcons();
        });

        // NUEVA FUNCIÓN PARA ABRIR LA URL USANDO EL TENANT (CARPETA) CORRECTO Y PASANDO EL UID OCULTO
        window.verSitioSocio = (tenantId, socioUid) => {
            // Siempre abre usando el Tenant ID en la URL (ej: ?tenant=ferreteria_sj)
            let urlDestino = `${BASE_URL}?tenant=${tenantId}`;
            
            // Adjuntamos el UID para que el sistema destino sepa a quién bloquear o destruir la sesión al cerrar
            if (socioUid && socioUid.trim() !== '') {
                urlDestino += `&uid=${socioUid.trim()}`;
            } else {
                showToast("Advertencia: Este socio no tiene un UID de Firebase registrado.", "error");
            }
            
            window.open(urlDestino, '_blank');
        };

        function loadData() {
            onSnapshot(collection(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants'), (snap) => {
                const list = document.getElementById('tenant-list');
                list.innerHTML = "";
                currentTenants = [];

                snap.forEach(d => {
                    const t = d.data();
                    const id = d.id;
                    currentTenants.push({ id, ...t });

                    const badge = t.estado === 'Activo' ? 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20' : (t.estado === 'Mantenimiento' ? 'text-amber-400 bg-amber-500/10 border-amber-500/20' : 'text-red-400 bg-red-500/10 border-red-500/20');
                    
                    const waLink = `https://wa.me/${t.telefono ? t.telefono.replace(/\D/g,'') : ''}?text=${encodeURIComponent('Hola ' + t.empresa + ', te contactamos de ProDigital soporte técnico.')}`;
                    
                    // CORRECCIÓN: La URL a copiar SIEMPRE muestra el ID (nombre de carpeta) para que sea la correcta
                    const tenantUrl = `${BASE_URL}?tenant=${id}`;

                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-800/30 transition-all border-b border-slate-700/30 group";
                    row.innerHTML = `
                        <td class="p-6">
                            <div class="font-black text-white text-xs uppercase group-hover:text-indigo-400 transition-colors">${t.empresa}</div>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[9px] text-slate-500 font-mono tracking-widest bg-slate-900/60 px-2 py-0.5 rounded truncate max-w-[200px]">${tenantUrl}</span>
                                <button onclick="copyToClipboard('${tenantUrl}')" class="text-indigo-400 hover:text-indigo-300" title="Copiar URL"><i data-lucide="copy" class="w-3 h-3"></i></button>
                            </div>
                        </td>
                        <td class="p-6">
                            <div class="text-[10px] font-mono font-bold ${t.adminUid ? 'text-emerald-400' : 'text-red-400'} truncate max-w-[120px]" title="${t.adminUid || 'No asignado'}">${t.adminUid || '¡FALTA UID!'}</div>
                        </td>
                        <td class="p-6">
                            <div class="text-[10px] text-slate-300 font-bold uppercase">${t.tipoPlan}</div>
                            <div class="text-[9px] text-slate-500 font-mono mt-0.5">Vence: ${t.fechaCorte}</div>
                        </td>
                        <td class="p-6">
                            <div class="text-indigo-300 font-mono text-sm font-black">₡${Number(t.montoContrato || 0).toLocaleString()}</div>
                        </td>
                        <td class="p-6 text-center">
                            <span class="px-4 py-1.5 rounded-full border ${badge} text-[9px] font-black uppercase tracking-widest">
                                ${t.estado}
                            </span>
                        </td>
                        <td class="p-6">
                            <div class="flex justify-end gap-2 items-center">
                                <a href="${waLink}" target="_blank" class="p-2.5 bg-emerald-500/10 text-emerald-400 rounded-xl hover:bg-emerald-500 hover:text-white transition-all shadow-lg" title="Contactar Socio por WhatsApp">
                                    <i data-lucide="message-circle" class="w-4 h-4"></i>
                                </a>
                                
                                <!-- CORRECCIÓN: Botón "Ver Sitio" ahora usa el enlace con ID de carpeta -->
                                <button onclick="verSitioSocio('${id}', '${t.adminUid || ''}')" class="p-2.5 bg-slate-700/50 text-slate-300 rounded-xl hover:bg-white hover:text-black transition-all shadow-lg" title="Ver el Sitio Real">
                                    <i data-lucide="external-link" class="w-4 h-4"></i>
                                </button>
                                
                                <button onclick="openEdit('${id}')" class="p-2.5 bg-indigo-600/20 text-indigo-400 rounded-xl hover:bg-indigo-600 hover:text-white transition-all shadow-lg" title="Configurar (Bloquear/Activar)">
                                    <i data-lucide="settings" class="w-4 h-4"></i>
                                </button>
                                <button onclick="deleteTenant('${id}')" class="p-2.5 bg-red-500/10 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all shadow-lg" title="Eliminar Socio Manualmente">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    list.appendChild(row);
                });
                lucide.createIcons();
            });
        }

        window.processHTML = (e, target) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const html = formatForDesktopView(ev.target.result);
                document.getElementById(target).value = html;
                showToast("HTML cargado y adaptado para vista de PC");
            };
            reader.readAsText(file);
        };

        window.createTenant = async () => {
            const id = document.getElementById('new-id').value.trim().toLowerCase().replace(/\s/g, '_');
            const uid = document.getElementById('new-uid').value.trim();
            const name = document.getElementById('new-name').value.trim();
            const plan = document.getElementById('new-plan').value;
            const tel = document.getElementById('new-tel').value.trim();
            const monto = document.getElementById('new-monto').value;
            const corte = document.getElementById('new-corte').value;

            if(!id || !uid || !name || !corte) return showToast("Complete los datos requeridos", "error");

            try {
                const payload = {
                    empresa: name,
                    adminUid: uid,
                    tipoPlan: plan,
                    telefono: tel,
                    montoContrato: Number(monto),
                    fechaCorte: corte,
                    estado: 'Activo',
                    htmlMora: '',
                    mensajeSuspension: '',
                    htmlMantenimiento: ''
                };
                
                // 1. Guardar en estructura de Control Global Maestro
                await setDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', id), payload);
                
                // 2. Guardar en el documento raíz de la URL
                await setDoc(doc(db, 'artifacts', id, 'public', 'data', 'usuarios', 'admin_data'), {
                    estadoTenant: 'Activo',
                    nombreEmpresa: name,
                    tenantId: id,
                    adminUid: uid,
                    htmlMora: '',
                    mensajeSuspension: '',
                    htmlMantenimiento: ''
                }, { merge: true });

                // 3. (CRÍTICO) Guardar directamente en la ruta del UID
                await setDoc(doc(db, 'artifacts', uid, 'public', 'data', 'usuarios', 'admin_data'), {
                    estadoTenant: 'Activo',
                    nombreEmpresa: name,
                    tenantId: uid,
                    adminUid: uid,
                    htmlMora: '',
                    mensajeSuspension: '',
                    htmlMantenimiento: ''
                }, { merge: true });

                showToast("Nueva plataforma activada con Doble Enlace UID");
                document.getElementById('new-id').value = "";
                document.getElementById('new-uid').value = "";
                document.getElementById('new-name').value = "";
                document.getElementById('new-tel').value = "";
                document.getElementById('new-monto').value = "";
                document.getElementById('new-corte').value = "";
            } catch (e) { 
                console.error("Error al crear inquilino:", e);
                showToast("Error al desplegar socio: " + e.message, "error"); 
            }
        };

        window.openEdit = (id) => {
            editingId = id;
            const t = currentTenants.find(x => x.id === id);
            document.getElementById('m_html_mora').value = t.htmlMora || t.mensajeSuspension || '';
            document.getElementById('m_html_mant').value = t.htmlMantenimiento || '';
            const rads = document.getElementsByName('m_status');
            for(let r of rads) if(r.value === t.estado) r.checked = true;
            document.getElementById('manageModal').classList.remove('hidden');
            lucide.createIcons();
        };

        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        window.saveChanges = async () => {
            const status = document.querySelector('input[name="m_status"]:checked').value;
            let hMora = document.getElementById('m_html_mora').value;
            let hMant = document.getElementById('m_html_mant').value;

            hMora = formatForDesktopView(hMora);
            hMant = formatForDesktopView(hMant);
            
            document.getElementById('m_html_mora').value = hMora;
            document.getElementById('m_html_mant').value = hMant;

            const t = currentTenants.find(x => x.id === editingId);
            const uid = t ? t.adminUid : '';

            try {
                // 1. Actualizar Registro Maestro Global
                await setDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', editingId), {
                    estado: status,
                    htmlMora: hMora,
                    mensajeSuspension: hMora,
                    htmlMantenimiento: hMant
                }, { merge: true });

                // 2. Sincronizar App del Socio en la ruta URL (Carpeta Tenant Original)
                await setDoc(doc(db, 'artifacts', editingId, 'public', 'data', 'usuarios', 'admin_data'), {
                    estadoTenant: status,
                    adminUid: uid,
                    htmlMora: hMora,
                    mensajeSuspension: hMora,
                    htmlMantenimiento: hMant
                }, { merge: true });

                // 3. (CRÍTICO) Disparo al UID Exacto para bloqueo total
                if (uid && uid.trim() !== '') {
                    await setDoc(doc(db, 'artifacts', uid.trim(), 'public', 'data', 'usuarios', 'admin_data'), {
                        estadoTenant: status,
                        adminUid: uid,
                        htmlMora: hMora,
                        mensajeSuspension: hMora,
                        htmlMantenimiento: hMant
                    }, { merge: true });
                }

                showToast("DOBLE BLOQUEO APLICADO: URL y UID sincronizados globalmente", "success");
                closeModal('manageModal');
            } catch (e) { 
                console.error("Error al sincronizar cambios:", e);
                showToast("Error de sincronización: " + e.message, "error"); 
            }
        };

        window.deleteTenant = async (id) => {
            if(confirm(`¿Estás seguro de eliminar permanentemente a ${id.toUpperCase()}? Esta acción no se puede deshacer.`)) {
                try {
                    await deleteDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', id));
                    showToast("Socio eliminado del sistema");
                } catch(e) { showToast("Error al eliminar", "error"); }
            }
        };

    </script>
</body>
</html>
